<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Video Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .video-container {
            position: relative; width: 100%; padding-top: 56.25%; /* 16:9 */
            background-color: #1a202c; border-radius: 0.75rem; overflow: hidden;
        }
        #remote-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }
        #local-video {
            width: 100%; height: 100%; object-fit: cover;
            /* Flip the local video horizontally so it's like a mirror */
            transform: scaleX(-1);
        }
        #local-video-container {
            position: absolute; bottom: 1.5rem; right: 1.5rem; width: 25%;
            max-width: 200px; border: 2px solid white; border-radius: 0.5rem;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #interpreted-text-overlay {
            position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7); color: white; padding: 0.75rem 1.5rem;
            border-radius: 0.5rem; font-size: 1.25rem; font-weight: 500;
            opacity: 0; transition: opacity 0.5s ease; text-align: center; max-width: 80%;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl mx-auto">
        <h1 class="text-3xl md:text-4xl font-bold text-center mb-2">Sign Language Video Call</h1>
        
        <div class="bg-gray-800 p-4 rounded-lg mb-4 text-center">
             <p class="text-gray-400">Your ID (Share with a friend):</p>
             <div class="flex items-center justify-center gap-2 mt-1">
                 <span id="my-peer-id" class="text-lg font-mono bg-gray-700 px-2 py-1 rounded">Loading...</span>
                 <button id="copy-id-btn" class="bg-blue-600 p-2 rounded-md hover:bg-blue-700 transition" title="Copy ID">
                     <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                 </button>
             </div>
        </div>

        <div id="call-container" class="video-container shadow-2xl">
            <video id="remote-video" autoplay playsinline></video>
            <div id="call-placeholder" class="w-full h-full flex items-center justify-center text-gray-500">
                <p class="text-lg">Waiting to connect...</p>
            </div>
            <div id="local-video-container">
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <div id="interpreted-text-overlay">
                <span id="interpreted-text">Hello</span>
            </div>
        </div>

        <div id="controls" class="mt-6 flex flex-wrap items-center justify-center gap-4">
            <input type="text" id="remote-peer-id-input" placeholder="Friend's ID" class="bg-gray-700 text-white px-4 py-3 rounded-lg text-center font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="start-call-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-transform transform hover:scale-105">
                Call
            </button>
            
            <button id="answer-call-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-transform transform hover:scale-105 hidden">
                Answer
            </button>
            <button id="reject-call-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-transform transform hover:scale-105 hidden">
                Reject
            </button>

            <button id="toggle-interpreter-btn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-transform transform hover:scale-105" disabled>
                Interpreter (Off)
            </button>
            
            <button id="end-call-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-transform transform hover:scale-105 hidden">
                End Call
            </button>
        </div>
        
        <p id="status" class="text-center text-gray-400 mt-4 h-5"></p>
    </div>

    <script type="module">
        
        // MediaPipe components are imported here
        import {
          FilesetResolver,
          GestureRecognizer
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js";

        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const myPeerIdSpan = document.getElementById('my-peer-id');
        const remotePeerIdInput = document.getElementById('remote-peer-id-input');
        const startCallBtn = document.getElementById('start-call-btn');
        const endCallBtn = document.getElementById('end-call-btn');
        const toggleInterpreterBtn = document.getElementById('toggle-interpreter-btn');
        const interpretedTextOverlay = document.getElementById('interpreted-text-overlay');
        const interpretedText = document.getElementById('interpreted-text');
        const callPlaceholder = document.getElementById('call-placeholder');
        const statusEl = document.getElementById('status');
        const copyIdBtn = document.getElementById('copy-id-btn');
        const answerCallBtn = document.getElementById('answer-call-btn');
        const rejectCallBtn = document.getElementById('reject-call-btn');

        let localStream, peer, currentCall, dataConnection, incomingCall;
        let isInterpreterOn = false;
        let textTimeout;

        // JS: ADDED MediaPipe variables
        let gestureRecognizer;
        let lastVideoTime = -1;
        let lastSentGesture = "";
        let clearGestureTimeout;

        async function startLocalVideo() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
            } catch (error) {
                console.error("Failed to get local stream", error);
                statusEl.textContent = "Could not start camera. Check permissions.";
            }
        }

        async function createGestureRecognizer() {
            
            statusEl.textContent = "Loading AI model (this may take a moment)...";
            
            try {
                // Load the Wasm files
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
                );

                // Create the gesture recognizer
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        // Load the file from your local folder
                        modelAssetPath: "gesture_recognizer.task", 
                        
                        // Use CPU for better compatibility
                        delegate: "CPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2 // Allow tracking two hands
                });
                
                console.log("Gesture recognizer loaded.");
                statusEl.textContent = "AI model loaded. Ready.";
                setTimeout(() => {
                    if (statusEl.textContent === "AI model loaded. Ready.") {
                        statusEl.textContent = "";
                    }
                }, 3000);
            } catch (error) {
                console.error("Failed to load gesture recognizer:", error);
                statusEl.textContent = "Failed to load AI model. Please refresh.";
            }
        }

        // JS: ADDED - The main AI processing loop
        async function predictWebcam() {
            // 1. Check if the interpreter is supposed to be on. If not, stop the loop.
            if (!isInterpreterOn) {
                lastSentGesture = ""; // Reset
                return; 
            }
            
            // 2. Make sure the model and video are ready
            if (!gestureRecognizer || localVideo.readyState < 3) {
                // Video not ready, try again on the next frame
                window.requestAnimationFrame(predictWebcam);
                return;
            }

            // 3. Process the video frame
            const nowInMs = Date.now();
            if (localVideo.currentTime !== lastVideoTime) {
                lastVideoTime = localVideo.currentTime;
                
                // Send the video frame to the ML model for processing
                // Note: We use localVideo element directly
                const results = gestureRecognizer.recognizeForVideo(localVideo, nowInMs);

                // 4. Handle the results
                if (results.gestures.length > 0 && results.gestures[0].length > 0) {
                    const categoryName = results.gestures[0][0].categoryName;
                    const categoryScore = results.gestures[0][0].score;

                    // Only send if confident (e.g., > 60%) and it's a *new* gesture
                    if (categoryName && categoryName !== "None" && categoryName !== lastSentGesture && categoryScore > 0.6) {
                        
                        console.log(`Recognized: ${categoryName}`);
                        lastSentGesture = categoryName;

                        // 5. Send the *real* gesture over the data connection
                        if (dataConnection && dataConnection.open) {
                            // Map model names to friendlier text
                            let friendlyText = categoryName.replace('_', ' '); 
                            dataConnection.send(friendlyText);
                            
                            // Set a timeout to clear the "last sent" gesture
                            // so the user can make the same sign again after a pause.
                            clearTimeout(clearGestureTimeout);
                            clearGestureTimeout = setTimeout(() => {
                                lastSentGesture = "";
                                // Also tell the other user to clear their screen
                                if (dataConnection && dataConnection.open) dataConnection.send("");
                            }, 2000); // Clear after 2 seconds
                        }
                    }
                }
            }

            // 6. Loop this function to process the next frame
            window.requestAnimationFrame(predictWebcam);
        }

        function initializePeer() {
            
            // This points to your local server (NO TYPOS)
            peer = new Peer(null, {
                host: 'localhost',
                port: 9000,
                path: '/',
                debug: 2
            });

            peer.on('open', id => myPeerIdSpan.textContent = id);
            
            peer.on('connection', (conn) => {
                setupDataConnection(conn);
            });

            peer.on('call', (call) => {
                incomingCall = call;
                statusEl.textContent = `Incoming call...`;
                remotePeerIdInput.classList.add('hidden');
                startCallBtn.classList.add('hidden');
                answerCallBtn.classList.remove('hidden');
                rejectCallBtn.classList.remove('hidden');
            });

            peer.on('error', err => {
                console.error('PeerJS error:', err);
                statusEl.textContent = "Connection error. Please refresh.";
            });
        }

        function setupDataConnection(conn) {
            dataConnection = conn;
            dataConnection.on('data', (data) => {
                clearTimeout(textTimeout);
                if (data) {
                    interpretedText.textContent = data;
                    interpretedTextOverlay.style.opacity = '1';
                    textTimeout = setTimeout(() => {
                        interpretedTextOverlay.style.opacity = '0';
                    }, 3000); // Keep text for 3 seconds
                } else {
                    // If data is empty string, fade out immediately
                    interpretedTextOverlay.style.opacity = '0';
                }
            });
        }
        
        function setupCall(call) {
            if (currentCall) currentCall.close();
            currentCall = call;

            currentCall.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
                callPlaceholder.style.display = 'none';
                remoteVideo.style.display = 'block';
                
                remotePeerIdInput.classList.add('hidden');
                startCallBtn.classList.add('hidden');
                
                endCallBtn.classList.remove('hidden');
                toggleInterpreterBtn.disabled = false;
                statusEl.textContent = "Call connected.";
            });
            
            currentCall.on('close', endActiveCall);
        }

        function endActiveCall() {
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            if(dataConnection) {
                dataConnection.close();
                dataConnection = null;
            }
            if (incomingCall) {
                incomingCall.close();
                incomingCall = null;
            }

            remoteVideo.srcObject = null;
            callPlaceholder.style.display = 'flex';
            remotePeerIdInput.classList.remove('hidden');
            startCallBtn.classList.remove('hidden');
            endCallBtn.classList.add('hidden');
            
            answerCallBtn.classList.add('hidden');
            rejectCallBtn.classList.add('hidden');
            
            // Turn off interpreter if it's on
            if (isInterpreterOn) {
                isInterpreterOn = false; // This will stop the predictWebcam loop
                toggleInterpreterBtn.textContent = 'Interpreter (Off)';
                toggleInterpreterBtn.classList.replace('bg-blue-600', 'bg-gray-700');
            }
            toggleInterpreterBtn.disabled = true;
            statusEl.textContent = "Call ended.";
        }

        startCallBtn.addEventListener('click', () => {
            const remotePeerId = remotePeerIdInput.value.trim();
            if (!remotePeerId || !peer) {
                statusEl.textContent = "Please enter a valid Friend's ID.";
                return;
            }
            if (!localStream) {
                statusEl.textContent = "Your camera is not started.";
                return;
            }
            
            const call = peer.call(remotePeerId, localStream);
            setupCall(call);

            const conn = peer.connect(remotePeerId);
            setupDataConnection(conn);
        });
        
        answerCallBtn.addEventListener('click', () => {
            if (!incomingCall) return;
            
            incomingCall.answer(localStream);
            setupCall(incomingCall);
            
            answerCallBtn.classList.add('hidden');
            rejectCallBtn.classList.add('hidden');
            incomingCall = null;
        });

        rejectCallBtn.addEventListener('click', () => {
            if (!incomingCall) return;

            incomingCall.close(); // Reject the call
            incomingCall = null;
            
            statusEl.textContent = "Call rejected.";
            remotePeerIdInput.classList.remove('hidden');
            startCallBtn.classList.remove('hidden'); 
            answerCallBtn.classList.add('hidden');
            rejectCallBtn.classList.add('hidden');
        });
        
        endCallBtn.addEventListener('click', endActiveCall);

        // JS: MODIFIED - This now starts the *real* interpreter loop
        toggleInterpreterBtn.addEventListener('click', () => {
            isInterpreterOn = !isInterpreterOn;
            
            if (isInterpreterOn) {
                if (!gestureRecognizer) {
                    statusEl.textContent = "AI model is not loaded yet.";
                    isInterpreterOn = false; // Turn it back off
                    return;
                }
                toggleInterpreterBtn.textContent = 'Interpreter (On)';
                toggleInterpreterBtn.classList.replace('bg-gray-700', 'bg-blue-600');
                
                // Start the recognition loop
                predictWebcam(); 
                
            } else {
                toggleInterpreterBtn.textContent = 'Interpreter (Off)';
                toggleInterpreterBtn.classList.replace('bg-blue-600', 'bg-gray-700');
                
                // The predictWebcam() loop will see isInterpreterOn is false and stop itself.
                // Send one last empty message to clear the remote text
                if (dataConnection && dataConnection.open) dataConnection.send("");
            }
        });

        copyIdBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(myPeerIdSpan.textContent).then(() => {
                statusEl.textContent = "ID copied to clipboard!";
                setTimeout(() => {
                    // Clear status if it's still the "copied" message
                    if (statusEl.textContent === "ID copied to clipboard!") {
                        statusEl.textContent = "";
                    }
                }, 2000);
            });
        });

        // JS: MODIFIED - main() now loads the AI model
        async function main() {
            await startLocalVideo();
            await createGestureRecognizer(); // <-- This is new
            initializePeer();
        }
        main();
    </script>
</body>
</html>
